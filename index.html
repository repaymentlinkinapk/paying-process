<!DOCTYPE html>
<html>
<head>
  <title>UPI PAYMENT</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; padding:20px; }
    .box { background:white; padding:20px; max-width:400px; margin:auto; border-radius:10px; }
    input, button { width:100%; padding:10px; margin-top:10px; }
    button { background:#007bff; color:white; border:none; border-radius:5px; }
    .row { display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>

<body>

<div class="box">

  <h2>UPI PAYMENT</h2>

  <!-- UPI -->
  <div class="row">
    <p><b>UPI ID:</b> <span id="upi"></span></p>
    <button style="width:100px;" onclick="copyUPI()">COPY</button>
  </div>

  <!-- AMOUNT -->
  <input type="number" id="amount" placeholder="ENTER AMOUNT">

  <!-- SELFIE -->
  <input type="file" id="selfie" accept="image/*" capture="user">

  <!-- SUBMIT -->
  <button onclick="submitData()">SUBMIT</button>

</div>

<script>

// GET DATA FROM URL
const params = new URLSearchParams(window.location.search);

let upiID = params.get("upi") || "example@upi";
let amount = params.get("amount") || "";

document.getElementById("upi").innerText = upiID;
document.getElementById("amount").value = amount;

// COPY UPI
function copyUPI(){
  navigator.clipboard.writeText(upiID);
  alert("UPI COPIED");
}

// SUBMIT
function submitData(){
  let amt = document.getElementById("amount").value;
  let selfie = document.getElementById("selfie").files[0];

  if(!amt){
    alert("ENTER AMOUNT");
    return;
  }

  alert("SUBMITTED SUCCESSFULLY");

  console.log({
    upi: upiID,
    amount: amt,
    selfie: selfie ? selfie.name : "NOT SELECTED"
  });
}

</script>

</body>
</html>
