<!DOCTYPE html>
<html>
<head>
  <title>UPI PAYMENT</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; padding:20px; }
    .box { background:white; padding:20px; max-width:420px; margin:auto; border-radius:12px; }
    input, button { width:100%; padding:12px; margin-top:12px; }
    button { background:#007bff; color:white; border:none; border-radius:6px; }
    .row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .upiBox { font-weight:bold; }
  </style>
</head>

<body>

<div class="box">

  <h2>UPI PAYMENT</h2>

  <!-- UPI SECTION -->
  <div class="row">
    <div class="upiBox">
      UPI ID: <span id="upi"></span>
    </div>
    <button style="width:100px;" onclick="copyUPI()">COPY</button>
  </div>

  <!-- AMOUNT -->
  <input type="number" id="amount" placeholder="Enter Amount">

  <!-- SELFIE -->
  <label><b>Take Selfie</b></label>
  <input type="file" id="selfie" accept="image/*" capture="user">

  <!-- SUBMIT -->
  <button onclick="submitData()">SUBMIT</button>

</div>

<script>

// GET DATA FROM URL
const params = new URLSearchParams(window.location.search);

// Dynamic values from link
let upiID = params.get("upi") || "example@upi";
let amount = params.get("amount") || "";

// SET VALUES
document.getElementById("upi").innerText = upiID;
document.getElementById("amount").value = amount;

// COPY UPI
function copyUPI(){
  navigator.clipboard.writeText(upiID);
  alert("UPI Copied");
}

// SUBMIT
function submitData(){
  let amt = document.getElementById("amount").value;
  let selfie = document.getElementById("selfie").files[0];

  if(!amt){
    alert("Enter Amount");
    return;
  }

  alert("Payment Form Submitted");

  console.log({
    upi: upiID,
    amount: amt,
    selfie: selfie ? selfie.name : "Not Selected"
  });
}

</script>

</body>
</html>
