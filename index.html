<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>

  <style>
    body{
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      transform: scale(0.95);
      transform-origin: top center;
    }

    .card{
      background:white;
      width:360px;
      padding:20px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .logo{
      width:70px;
      height:70px;
      border-radius:50%;
      background:#2563eb;
      margin:auto;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-weight:bold;
      font-size:18px;
    }

    .upi{
      margin-top:15px;
      font-weight:bold;
      word-break:break-all;
    }

    .box{
      margin-top:12px;
      padding:12px;
      border-radius:8px;
      background:#f3f4f6;
      font-weight:bold;
    }

    .timer{
      margin-top:12px;
      padding:10px;
      border-radius:8px;
      background:#111827;
      color:white;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:12px;
      border-radius:8px;
      border:none;
      color:white;
    }

    .copy{ background:#22c55e; }
    .selfieBtn{ background:#f59e0b; }
    .submit{ background:#2563eb; }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">PAY</div>

  <h3>Pay Now</h3>

  <!-- UPI -->
  <div class="upi" id="upiBox">example@upi</div>
  <button class="copy" onclick="copyUPI()">Copy UPI</button>

  <!-- AMOUNT -->
  <div class="box">
    Amount: ₹ <span id="amountBox">500</span>
  </div>

  <!-- TIMER -->
  <div class="timer">
    Time Left: <span id="time">08:00</span>
  </div>

  <!-- SELFIE -->
  <input type="file" id="selfie" accept="image/*" capture="user" style="display:none">

  <button class="selfieBtn" onclick="openSelfie()">Take Selfie</button>

  <button class="submit" onclick="submitData()">Submit</button>

</div>

<script>

// ✅ URL SE DATA AAYEGA
const params = new URLSearchParams(window.location.search);

let upiID = params.get("upi") || "ali@upi";
let amountValue = params.get("amount") || 5000;

// SHOW ON PAGE
document.getElementById("upiBox").innerText = upiID;
document.getElementById("amountBox").innerText = amountValue;

// COPY UPI
function copyUPI(){
  navigator.clipboard.writeText(upiID);
  alert("UPI Copied");
}

// SELFIE
function openSelfie(){
  document.getElementById("selfie").click();
}

// TIMER (8 MIN)
let timeLeft = 8 * 60;
let timerEl = document.getElementById("time");

function updateTimer(){
  let minutes = Math.floor(timeLeft / 60);
  let seconds = timeLeft % 60;

  timerEl.innerText =
    String(minutes).padStart(2,'0') + ":" +
    String(seconds).padStart(2,'0');

  if(timeLeft > 0){
    timeLeft--;
  } else {
    timerEl.innerText = "EXPIRED";
  }
}

setInterval(updateTimer, 1000);
updateTimer();

// SUBMIT
function submitData(){
  alert("Submitted Successfully");
  console.log({
    upi: upiID,
    amount: amountValue
  });
}

</script>

</body>
</html>
